<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAILOG - AI Philosophy Debates</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: rgb(26, 3, 56);
            --bg-secondary: #1a1a3a;
            --bg-card: rgba(26, 3, 56, 0.9);
            --accent-left: #3b82f6;
            --accent-right: #8b5cf6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: rgba(59, 130, 246, 0.2);
            --glow-left: rgba(59, 130, 246, 0.4);
            --glow-right: rgba(139, 92, 246, 0.4);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        /* Elegant particle system background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, var(--glow-left) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--glow-right) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
            z-index: -2;
            animation: breathe 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(59, 130, 246, 0.02) 2px,
                    rgba(59, 130, 246, 0.02) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 92, 246, 0.02) 2px,
                    rgba(139, 92, 246, 0.02) 4px
                );
            background-size: 60px 60px, 40px 40px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes breathe {
            0%, 100% { 
                opacity: 0.7;
                filter: blur(0px);
            }
            50% { 
                opacity: 1;
                filter: blur(1px);
            }
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 40px); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            position: relative;
            padding: 15px 20px;
            margin: 10px 0;
            background: rgba(26, 3, 56, 0.8);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 80px rgba(59, 130, 246, 0.1),
                0 0 120px rgba(139, 92, 246, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 32px;
            padding: 2px;
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.4) 0%, 
                rgba(139, 92, 246, 0.4) 50%, 
                rgba(59, 130, 246, 0.4) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            animation: headerGlow 6s ease-in-out infinite;
        }

        @keyframes headerGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .logo {
            max-width: 100%;
            width: 300px;
            height: auto;
            display: block;
            object-fit: contain;
            margin: 0 auto 5px auto;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.9;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1em;
            font-weight: 300;
            margin-bottom: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .lang-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            border-color: var(--accent-left);
            color: var(--accent-left);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            border-color: transparent;
            color: white;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 20px;
            flex: 1;
            overflow: hidden;
            margin-bottom: 10px;
        }

        /* Character panels */
        .character-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            position: relative;
            transition: all 0.4s ease;
            transform: translateY(0);
            overflow-y: auto;
            height: 100%;
        }

        .character-panel::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, transparent, var(--border-color), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .character-panel:hover {
            transform: translateY(-8px);
            backdrop-filter: blur(20px);
        }

        .character-panel:hover::before {
            opacity: 1;
        }

        .character-panel.left {
            box-shadow: 
                0 0 40px var(--glow-left),
                0 20px 40px rgba(59, 130, 246, 0.1);
            animation: leftPulse 8s ease-in-out infinite;
        }

        .character-panel.right {
            box-shadow: 
                0 0 40px var(--glow-right),
                0 20px 40px rgba(139, 92, 246, 0.1);
            animation: rightPulse 8s ease-in-out infinite 2s;
        }

        @keyframes leftPulse {
            0%, 100% { box-shadow: 0 0 40px var(--glow-left), 0 20px 40px rgba(59, 130, 246, 0.1); }
            50% { box-shadow: 0 0 60px var(--glow-left), 0 25px 50px rgba(59, 130, 246, 0.15); }
        }

        @keyframes rightPulse {
            0%, 100% { box-shadow: 0 0 40px var(--glow-right), 0 20px 40px rgba(139, 92, 246, 0.1); }
            50% { box-shadow: 0 0 60px var(--glow-right), 0 25px 50px rgba(139, 92, 246, 0.15); }
        }

        .avatar-section {
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar-container {
            width: 180px;
            min-height: 240px;
            margin: 0 auto 10px;
            border-radius: 15px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .character-panel.left .avatar-container {
            border-color: var(--accent-left);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), transparent);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(59, 130, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .character-panel.right .avatar-container {
            border-color: var(--accent-right);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), transparent);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .avatar-input {
            width: 100%;
            height: 100%;
            opacity: 0;
            position: absolute;
            cursor: pointer;
            z-index: 2;
        }

        .avatar-preview {
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            object-position: center 20%;
            border-radius: 15px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: optimize-quality;
            filter: 
                contrast(1.08) 
                brightness(1.03) 
                saturate(1.12) 
                sharpen(0.3)
                unsharp-mask(1px, 1px, 0.7);
            transition: all 0.3s ease;
            transform: scale(1);
            margin: 0 auto;
        }

        .avatar-preview:hover {
            filter: 
                contrast(1.15) 
                brightness(1.06) 
                saturate(1.18)
                sharpen(0.5)
                unsharp-mask(1px, 1px, 0.8);
            transform: scale(1.02);
        }

        /* High DPI optimization */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .avatar-preview {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: optimize-quality;
                filter: 
                    contrast(1.06) 
                    brightness(1.02) 
                    saturate(1.1);
            }
        }

        .avatar-placeholder {
            color: var(--text-secondary);
            font-size: 0.9em;
            text-align: center;
            padding: 10px;
        }

        .generate-avatar-btn {
            width: 100%;
            padding: 10px 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            z-index: 10;
        }

        .generate-avatar-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .generate-avatar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .avatar-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            padding: 20px;
        }

        .character-panel.right .generate-avatar-btn {
            background: linear-gradient(135deg, var(--accent-right), var(--accent-left));
        }

        .character-panel.right .generate-avatar-btn:hover {
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        .character-config {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 50;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .character-select,
        .character-name,
        .character-prompt {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95em;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }

        .character-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: none;
            padding: 10px;
        }

        .character-select option:hover {
            background: var(--accent-left);
            color: white;
        }

        .character-select:focus,
        .character-name:focus,
        .character-prompt:focus {
            outline: none;
            border-color: var(--accent-left);
            background: rgba(59, 130, 246, 0.05);
        }

        .character-panel.right .character-select:focus,
        .character-panel.right .character-name:focus,
        .character-panel.right .character-prompt:focus {
            border-color: var(--accent-right);
            background: rgba(139, 92, 246, 0.05);
        }

        .character-prompt {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.5;
        }

        /* Chat container */
        .chat-container {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(59, 130, 246, 0.1),
                0 0 120px rgba(139, 92, 246, 0.05),
                0 30px 60px rgba(0, 0, 0, 0.3);
            animation: centerGlow 12s ease-in-out infinite;
        }

        @keyframes centerGlow {
            0%, 100% { 
                box-shadow: 
                    0 0 60px rgba(59, 130, 246, 0.1),
                    0 0 120px rgba(139, 92, 246, 0.05),
                    0 30px 60px rgba(0, 0, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 80px rgba(59, 130, 246, 0.15),
                    0 0 160px rgba(139, 92, 246, 0.08),
                    0 35px 70px rgba(0, 0, 0, 0.4);
            }
        }

        .chat-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-header h2 {
            font-size: 1.2em;
            font-weight: 400;
            color: var(--text-primary);
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            animation: messageSlide 0.4s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-left .message-bubble {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1));
            border-left: 3px solid var(--accent-left);
            margin-right: 15%;
        }

        .message-right .message-bubble {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1));
            border-right: 3px solid var(--accent-right);
            margin-left: 15%;
        }

        .message-bubble {
            padding: 18px;
            border-radius: 12px;
            position: relative;
        }

        .message-author {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .message-left .message-author {
            color: var(--accent-left);
        }

        .message-right .message-author {
            color: var(--accent-right);
            text-align: right;
        }

        .message-content {
            line-height: 1.6;
            color: var(--text-primary);
        }

        .message-right .message-content {
            text-align: right;
        }

        /* Input area */
        .chat-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
        }

        .topic-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .topic-input:focus {
            outline: none;
            border-color: var(--accent-left);
            background: rgba(59, 130, 246, 0.05);
        }

        .topic-input::placeholder {
            color: var(--text-secondary);
        }

        .start-button {
            padding: 14px 35px;
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: inline-flex;
            gap: 5px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin: 10px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-left);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { 
                transform: translateY(0);
                opacity: 0.5;
            }
            30% { 
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .debate-end {
            text-align: center;
            margin: 30px 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        @media (max-width: 1400px) {
            .main-content {
                grid-template-columns: 300px 1fr 300px;
            }
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
                max-width: 800px;
                margin: 0 auto;
            }
            
            .character-panel {
                display: grid;
                grid-template-columns: 150px 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn active" onclick="setLanguage('en')" id="langEn">EN</button>
        <button class="lang-btn" onclick="setLanguage('tr')" id="langTr">TR</button>
    </div>
    
    <div class="container">
        <div class="header">
            <img src="./assets/logo.png" alt="DIAILOG Logo" class="logo">
            <p id="subtitle">Witness philosophical dialogues between AI personas</p>
        </div>

        <div class="main-content">
            <!-- Left Character -->
            <div class="character-panel left">
                <div class="avatar-section">
                    <div class="avatar-container" id="leftAvatarContainer">
                        <img class="avatar-preview" id="leftAvatarPreview" src="./avatars/stoic.jpg" alt="Character Avatar">
                    </div>
                </div>
                
                <div class="character-config">
                    <div class="form-group">
                        <label>Character Template</label>
                        <select class="character-select" id="leftCharSelect">
                            <option value="custom">Custom Character</option>
                            <option value="stoic" selected>Stoic Philosopher</option>
                            <option value="buddhist">Buddhist Teacher</option>
                            <option value="scientist">Scientist</option>
                            <option value="artist">Artist</option>
                            <option value="existentialist">Existentialist</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Character Name</label>
                        <input type="text" class="character-name" id="leftCharName" placeholder="Enter name..." value="Marcus">
                    </div>
                    
                    <div class="form-group">
                        <label>Character Personality</label>
                        <textarea class="character-prompt" id="leftCharPrompt" placeholder="Describe the character's philosophy and personality...">Sen Marcus adında bir Stoacı filozofsun. Stoa felsefesi öğretilerini savunursun. Erdem, bilgelik, cesaret, adalet ve ölçülülük değerlerine inanırsın. Doğaya uygun yaşamayı, duyguları kontrol etmeyi ve kaderi kabullenmeyi öğütlersin.</textarea>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-container">
                <div class="chat-header">
                    <h2>Philosophical Debate Arena</h2>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        Welcome to AI Philosophy Debates.<br>
                        Enter a topic below and click "Start Debate" to begin.<br>
                        Each character will exchange 5 responses on your chosen topic.
                    </div>
                </div>
                <div class="chat-input-container">
                    <div class="input-wrapper">
                        <input type="text" class="topic-input" id="topicInput" placeholder="Enter debate topic... (e.g., What is the meaning of life?)">
                        <button class="start-button" id="startButton" onclick="startDebate()">Start Debate</button>
                    </div>
                </div>
            </div>

            <!-- Right Character -->
            <div class="character-panel right">
                <div class="avatar-section">
                    <div class="avatar-container" id="rightAvatarContainer">
                        <img class="avatar-preview" id="rightAvatarPreview" src="./avatars/buddhist.jpg" alt="Character Avatar">
                    </div>
                </div>
                
                <div class="character-config">
                    <div class="form-group">
                        <label>Character Template</label>
                        <select class="character-select" id="rightCharSelect">
                            <option value="custom">Custom Character</option>
                            <option value="stoic">Stoic Philosopher</option>
                            <option value="buddhist" selected>Buddhist Teacher</option>
                            <option value="scientist">Scientist</option>
                            <option value="artist">Artist</option>
                            <option value="existentialist">Existentialist</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Character Name</label>
                        <input type="text" class="character-name" id="rightCharName" placeholder="Enter name..." value="Dharma">
                    </div>
                    
                    <div class="form-group">
                        <label>Character Personality</label>
                        <textarea class="character-prompt" id="rightCharPrompt" placeholder="Describe the character's philosophy and personality...">Sen Dharma adında bir Budist öğretmensin. Budizm'in temel öğretilerini savunursun. Dört asil gerçek, sekiz katlı yol, karma, nirvana ve aydınlanma kavramlarına inanırsın. Acının doğasını, bağımlılıktan kurtulmayı ve meditasyonun önemini vurgularsın.</textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const characterTemplates = {
            en: {
                stoic: {
                    name: "Marcus",
                    prompt: "You are Marcus, a Stoic philosopher. You defend the teachings of Stoic philosophy. You believe in virtue, wisdom, courage, justice and temperance. You advocate living in accordance with nature, controlling emotions and accepting fate.",
                    displayName: "Stoic Philosopher"
                },
                buddhist: {
                    name: "Dharma", 
                    prompt: "You are Dharma, a Buddhist teacher. You defend the fundamental teachings of Buddhism. You believe in the Four Noble Truths, the Eightfold Path, karma, nirvana and enlightenment. You emphasize the nature of suffering, liberation from attachment and the importance of meditation.",
                    displayName: "Buddhist Teacher"
                },
                scientist: {
                    name: "Newton",
                    prompt: "You are Newton, a scientist. You defend scientific method, evidence-based thinking and rational analysis. You believe the universe can be explained by mathematical laws and emphasize the importance of observation and experimentation.",
                    displayName: "Scientist"
                },
                artist: {
                    name: "Frida",
                    prompt: "You are Frida, an artist. You believe in art's emotional expression power, the importance of creativity and the value of aesthetic experience. You advocate that art gives meaning to life and enriches human experience.",
                    displayName: "Artist"
                },
                existentialist: {
                    name: "Sartre",
                    prompt: "You are Sartre, an existentialist philosopher. You believe that existence precedes essence, that free will is absolute and that humans must create their own meaning. You emphasize responsibility, freedom and authenticity.",
                    displayName: "Existentialist"
                }
            },
            tr: {
                stoic: {
                    name: "Marcus",
                    prompt: "Sen Marcus adında bir Stoacı filozofsun. Stoa felsefesi öğretilerini savunursun. Erdem, bilgelik, cesaret, adalet ve ölçülülük değerlerine inanırsın. Doğaya uygun yaşamayı, duyguları kontrol etmeyi ve kaderi kabullenmeyi öğütlersin.",
                    displayName: "Stoacı Filozof"
                },
                buddhist: {
                    name: "Dharma",
                    prompt: "Sen Dharma adında bir Budist öğretmensin. Budizm'in temel öğretilerini savunursun. Dört asil gerçek, sekiz katlı yol, karma, nirvana ve aydınlanma kavramlarına inanırsın. Acının doğasını, bağımlılıktan kurtulmayı ve meditasyonun önemini vurgularsın.",
                    displayName: "Budist Öğretmen"
                },
                scientist: {
                    name: "Newton",
                    prompt: "Sen Newton adında bir bilim insanısın. Bilimsel metodu, kanıta dayalı düşünmeyi ve rasyonel analizi savunursun. Evrenin matematiksel yasalarla açıklanabileceğine, gözlem ve deneyin önemine inanırsın.",
                    displayName: "Bilim İnsanı"
                },
                artist: {
                    name: "Frida",
                    prompt: "Sen Frida adında bir sanatçısın. Sanatın duygusal ifade gücüne, yaratıcılığın önemine ve estetik deneyimin değerine inanırsın. Sanatın hayatı anlamlandırdığını ve insani deneyimi zenginleştirdiğini savunursun.",
                    displayName: "Sanatçı"
                },
                existentialist: {
                    name: "Sartre",
                    prompt: "Sen Sartre adında bir varoluşçu filozofsun. Varoluşun özden önce geldiğine, özgür iradenin mutlak olduğuna ve insanın kendi anlamını yaratması gerektiğine inanırsın. Sorumluluk, özgürlük ve otantiklik kavramlarını vurgularsın.",
                    displayName: "Varoluşçu Filozof"
                }
            }
        };


        function updateCharacterAvatar(side, characterType) {
            const avatarPreview = document.getElementById(`${side}AvatarPreview`);
            avatarPreview.src = `./avatars/${characterType}.jpg`;
        }

        function toggleInputs(side, isCustom) {
            const nameInput = document.getElementById(`${side}CharName`);
            const promptInput = document.getElementById(`${side}CharPrompt`);
            
            nameInput.disabled = !isCustom;
            promptInput.disabled = !isCustom;
            
            if (isCustom) {
                nameInput.style.opacity = '1';
                promptInput.style.opacity = '1';
                nameInput.style.cursor = 'text';
                promptInput.style.cursor = 'text';
            } else {
                nameInput.style.opacity = '0.6';
                promptInput.style.opacity = '0.6';
                nameInput.style.cursor = 'not-allowed';
                promptInput.style.cursor = 'not-allowed';
            }
        }

        document.getElementById('leftCharSelect').addEventListener('change', function(e) {
            const characterType = e.target.value;
            const isCustom = characterType === 'custom';
            
            if (!isCustom) {
                const template = characterTemplates[currentLanguage][characterType];
                document.getElementById('leftCharName').value = template.name;
                document.getElementById('leftCharPrompt').value = template.prompt;
                updateCharacterAvatar('left', characterType);
            } else {
                updateCharacterAvatar('left', 'custom');
            }
            
            toggleInputs('left', isCustom);
        });

        document.getElementById('rightCharSelect').addEventListener('change', function(e) {
            const characterType = e.target.value;
            const isCustom = characterType === 'custom';
            
            if (!isCustom) {
                const template = characterTemplates[currentLanguage][characterType];
                document.getElementById('rightCharName').value = template.name;
                document.getElementById('rightCharPrompt').value = template.prompt;
                updateCharacterAvatar('right', characterType);
            } else {
                updateCharacterAvatar('right', 'custom');
            }
            
            toggleInputs('right', isCustom);
        });

        let conversationHistory = [];
        let currentRound = 0;
        let currentLanguage = 'en';

        const translations = {
            en: {
                subtitle: "Witness philosophical dialogues between AI personas",
                chatHeader: "Philosophical Debate Arena", 
                welcomeMessage: "Welcome to DIAILOG.<br>Enter a topic below and click \"Start Debate\" to begin.<br>Each character will exchange 5 responses on your chosen topic.",
                topicPlaceholder: "Enter debate topic... (e.g., What is the meaning of life?)",
                startButton: "Start Debate",
                newDebateButton: "New Debate",
                characterTemplate: "Character Template",
                characterName: "Character Name",
                characterPersonality: "Character Personality",
                customCharacter: "Custom Character"
            },
            tr: {
                subtitle: "AI kişilikleri arasındaki felsefi diyalogları izleyin",
                chatHeader: "Felsefi Tartışma Arenası",
                welcomeMessage: "DIAILOG'a hoş geldiniz.<br>Aşağıya bir konu girin ve \"Tartışmayı Başlat\" butonuna tıklayın.<br>Her karakter seçtiğiniz konu hakkında 5 yanıt alışverişi yapacak.",
                topicPlaceholder: "Tartışma konusu girin... (örn: Hayatın anlamı nedir?)",
                startButton: "Tartışmayı Başlat",
                newDebateButton: "Yeni Tartışma",
                characterTemplate: "Karakter Şablonu",
                characterName: "Karakter Adı", 
                characterPersonality: "Karakter Kişiliği",
                customCharacter: "Özel Karakter"
            }
        };

        function updateDropdownOptions(lang) {
            const templates = characterTemplates[lang];
            const t = translations[lang];
            
            ['left', 'right'].forEach(side => {
                const select = document.getElementById(`${side}CharSelect`);
                const currentValue = select.value;
                
                select.innerHTML = `
                    <option value="custom">${t.customCharacter}</option>
                    <option value="stoic">${templates.stoic.displayName}</option>
                    <option value="buddhist">${templates.buddhist.displayName}</option>
                    <option value="scientist">${templates.scientist.displayName}</option>
                    <option value="artist">${templates.artist.displayName}</option>
                    <option value="existentialist">${templates.existentialist.displayName}</option>
                `;
                
                select.value = currentValue;
                
                // Update character data if not custom
                if (currentValue !== 'custom') {
                    const template = templates[currentValue];
                    document.getElementById(`${side}CharName`).value = template.name;
                    document.getElementById(`${side}CharPrompt`).value = template.prompt;
                }
            });
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            const t = translations[lang];
            
            document.getElementById('subtitle').innerHTML = t.subtitle;
            document.querySelector('.chat-header h2').textContent = t.chatHeader;
            document.querySelector('.welcome-message').innerHTML = t.welcomeMessage;
            document.getElementById('topicInput').placeholder = t.topicPlaceholder;
            
            const startBtn = document.getElementById('startButton');
            startBtn.textContent = startBtn.disabled ? (lang === 'en' ? 'New Debate' : 'Yeni Tartışma') : t.startButton;
            
            // Update labels
            document.querySelectorAll('label').forEach((label, index) => {
                const labelKeys = [t.characterTemplate, t.characterName, t.characterPersonality];
                const keyIndex = index % 3;
                if (labelKeys[keyIndex]) label.textContent = labelKeys[keyIndex];
            });
            
            // Update dropdown options
            updateDropdownOptions(lang);
            
            // Update language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang' + lang.toUpperCase()).classList.add('active');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            toggleInputs('left', false);  // Start with stoic locked
            toggleInputs('right', false); // Start with buddhist locked
            setLanguage('en');
        });

        // Google Apps Script Web App URL
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby-xAjVDtqcw9yyaNFu-2REGn8axO56TJ1W7FWP8di5Iwe3lrdYdaFXQ0zloWAnq6BJ/exec';

        async function logData(anon_id, model_pick, topic, extra = '') {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        anon_id: anon_id,
                        model_pick: model_pick,
                        topic: topic,
                        extra: extra
                    })
                });
                
                const result = await response.json();
                console.log('Log kaydedildi:', result);
                return result;
                
            } catch (error) {
                console.error('Log kaydetme hatası:', error);
                throw error;
            }
        }

        async function callClaude(messages) {
            try {
                // Use local server instead of direct API call
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        messages: messages
                    })
                });

                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }

                const data = await response.json();
                return data.content || data.response || "No response received";
            } catch (error) {
                console.error("Error calling Claude:", error);
                return "Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.";
            }
        }

        function addMessage(author, content, isLeft) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isLeft ? 'message-left' : 'message-right'}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-author">${author}</div>
                    <div class="message-content">${content}</div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function startDebate() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('Please enter a debate topic!');
                return;
            }

            const leftName = document.getElementById('leftCharName').value || 'Left Character';
            const leftPrompt = document.getElementById('leftCharPrompt').value;
            const rightName = document.getElementById('rightCharName').value || 'Right Character';
            const rightPrompt = document.getElementById('rightCharPrompt').value;

            // Generate unique anonymous ID
            const anon_id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            // Log debate start
            try {
                await logData(anon_id, `${leftName} vs ${rightName}`, topic, `Left: ${leftPrompt.substring(0, 50)}... Right: ${rightPrompt.substring(0, 50)}...`);
            } catch (error) {
                console.warn('Logging failed:', error);
            }

            // Clear and start
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('startButton').disabled = true;
            document.getElementById('startButton').innerHTML = '<div class="loading"></div>';
            
            conversationHistory = [];
            currentRound = 0;

            // Debate loop
            for (let round = 0; round < 5; round++) {
                // Left character speaks
                showTypingIndicator();
                
                const leftMessages = [
                    {
                        role: "user",
                        content: `${leftPrompt}

Topic of discussion: "${topic}"

${conversationHistory.length > 0 ? `Conversation so far:
${conversationHistory.map(h => `${h.author}: ${h.content}`).join('\n\n')}` : 'You speak first.'}

Kısa ve öz bir şekilde (maksimum 2-3 cümle) bu konudaki görüşünü belirt. Karşı tarafa saygılı ol ama kendi felsefi görüşünü savun.`
                    }
                ];

                const leftResponse = await callClaude(leftMessages);
                removeTypingIndicator();
                addMessage(leftName, leftResponse, true);
                conversationHistory.push({ author: leftName, content: leftResponse });

                await new Promise(resolve => setTimeout(resolve, 1000));

                // Right character speaks
                showTypingIndicator();
                
                const rightMessages = [
                    {
                        role: "user",
                        content: `${rightPrompt}

Topic of discussion: "${topic}"

Conversation so far:
${conversationHistory.map(h => `${h.author}: ${h.content}`).join('\n\n')}

Kısa ve öz bir şekilde (maksimum 2-3 cümle) bu konudaki görüşünü belirt ve ${leftName}'un söylediklerine yanıt ver. Saygılı ol ama kendi felsefi görüşünü savun.`
                    }
                ];

                const rightResponse = await callClaude(rightMessages);
                removeTypingIndicator();
                addMessage(rightName, rightResponse, false);
                conversationHistory.push({ author: rightName, content: rightResponse });

                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            // Debate end
            const endMessage = document.createElement('div');
            endMessage.className = 'debate-end';
            endMessage.textContent = '✨ DEBATE CONCLUDED ✨';
            document.getElementById('chatMessages').appendChild(endMessage);

            document.getElementById('startButton').disabled = false;
            document.getElementById('startButton').innerHTML = 'New Debate';
        }

        // Enter key to start
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('startButton').disabled) {
                startDebate();
            }
        });
    </script>
</body>
</html>
