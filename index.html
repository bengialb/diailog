<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diailog</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon-32x32.png">
    <link rel="manifest" href="./assets/site.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: rgb(26, 3, 56);
            --bg-secondary: #1a1a3a;
            --bg-card: rgba(26, 3, 56, 0.9);
            --accent-left: #3b82f6;
            --accent-right: #8b5cf6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: rgba(59, 130, 246, 0.2);
            --glow-left: rgba(59, 130, 246, 0.4);
            --glow-right: rgba(139, 92, 246, 0.4);
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            color: var(--text-primary);
            position: relative;
        }

        /* Elegant particle system background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, var(--glow-left) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--glow-right) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
            z-index: -2;
            animation: breathe 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(59, 130, 246, 0.02) 2px,
                    rgba(59, 130, 246, 0.02) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 92, 246, 0.02) 2px,
                    rgba(139, 92, 246, 0.02) 4px
                );
            background-size: 60px 60px, 40px 40px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes breathe {
            0%, 100% { 
                opacity: 0.7;
                filter: blur(0px);
            }
            50% { 
                opacity: 1;
                filter: blur(1px);
            }
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 40px); }
        }

        .container {
            max-width: 95vw;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5vw;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            position: relative;
            padding: 15px 20px;
            margin: 10px 0;
            background: rgba(26, 3, 56, 0.8);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 80px rgba(59, 130, 246, 0.1),
                0 0 120px rgba(139, 92, 246, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 32px;
            padding: 2px;
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.4) 0%, 
                rgba(139, 92, 246, 0.4) 50%, 
                rgba(59, 130, 246, 0.4) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            animation: headerGlow 6s ease-in-out infinite;
        }

        @keyframes headerGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .logo {
            max-width: 100%;
            width: 300px;
            height: auto;
            display: block;
            object-fit: contain;
            margin: 0 auto 5px auto;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.9;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1em;
            font-weight: 300;
            margin-bottom: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .lang-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            border-color: var(--accent-left);
            color: var(--accent-left);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            border-color: transparent;
            color: white;
        }

        .main-content {
            display: grid;
            grid-template-columns: 22vw 1fr 22vw;
            gap: 1vw;
            flex: 1;
            margin-bottom: 5px;
        }

        /* Character panels */
        .character-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            position: relative;
            transition: all 0.4s ease;
            transform: translateY(0);
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }

        .character-panel::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, transparent, var(--border-color), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .character-panel:hover {
            transform: translateY(-8px);
            backdrop-filter: blur(20px);
        }

        .character-panel:hover::before {
            opacity: 1;
        }

        .character-panel.left {
            box-shadow: 
                0 0 40px var(--glow-left),
                0 20px 40px rgba(59, 130, 246, 0.1);
            animation: leftPulse 8s ease-in-out infinite;
        }

        .character-panel.right {
            box-shadow: 
                0 0 40px var(--glow-right),
                0 20px 40px rgba(139, 92, 246, 0.1);
            animation: rightPulse 8s ease-in-out infinite 2s;
        }

        @keyframes leftPulse {
            0%, 100% { box-shadow: 0 0 40px var(--glow-left), 0 20px 40px rgba(59, 130, 246, 0.1); }
            50% { box-shadow: 0 0 60px var(--glow-left), 0 25px 50px rgba(59, 130, 246, 0.15); }
        }

        @keyframes rightPulse {
            0%, 100% { box-shadow: 0 0 40px var(--glow-right), 0 20px 40px rgba(139, 92, 246, 0.1); }
            50% { box-shadow: 0 0 60px var(--glow-right), 0 25px 50px rgba(139, 92, 246, 0.15); }
        }

        .avatar-section {
            margin-bottom: 20px;
            text-align: center;
        }

        .avatar-container {
            width: 9vw;
            height: 14.4vw;
            margin: 0 auto 10px;
            border-radius: 15px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .character-panel.left .avatar-container {
            border-color: var(--accent-left);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), transparent);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(59, 130, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .character-panel.right .avatar-container {
            border-color: var(--accent-right);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), transparent);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .avatar-input {
            width: 100%;
            height: 100%;
            opacity: 0;
            position: absolute;
            cursor: pointer;
            z-index: 2;
        }

        .avatar-preview {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            object-position: center 20%;
            border-radius: 15px;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: optimize-quality;
            filter: 
                contrast(1.08) 
                brightness(1.03) 
                saturate(1.12) 
                sharpen(0.3)
                unsharp-mask(1px, 1px, 0.7);
            transition: all 0.3s ease;
            transform: scale(1);
            margin: 0 auto;
        }

        .avatar-preview:hover {
            filter: 
                contrast(1.15) 
                brightness(1.06) 
                saturate(1.18)
                sharpen(0.5)
                unsharp-mask(1px, 1px, 0.8);
            transform: scale(1.02);
        }

        /* High DPI optimization */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .avatar-preview {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: optimize-quality;
                filter: 
                    contrast(1.06) 
                    brightness(1.02) 
                    saturate(1.1);
            }
        }

        .avatar-placeholder {
            color: var(--text-secondary);
            font-size: 0.9em;
            text-align: center;
            padding: 10px;
        }

        .generate-avatar-btn {
            width: 100%;
            padding: 10px 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            z-index: 10;
        }

        .generate-avatar-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .generate-avatar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .avatar-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 50%;
            padding: 20px;
        }

        .character-panel.right .generate-avatar-btn {
            background: linear-gradient(135deg, var(--accent-right), var(--accent-left));
        }

        .character-panel.right .generate-avatar-btn:hover {
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        .character-config {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 50;
            flex: 1;
            overflow: hidden;
            width: 100%;
            max-width: 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .character-select,
        .character-name,
        .character-prompt {
            width: 100%;
            max-width: 100%;
            padding: 12px 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95em;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
            box-sizing: border-box;
        }

        .character-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: none;
            padding: 10px;
        }

        .character-select option:hover {
            background: var(--accent-left);
            color: white;
        }

        .character-select:focus,
        .character-name:focus,
        .character-prompt:focus {
            outline: none;
            border-color: var(--accent-left);
            background: rgba(59, 130, 246, 0.05);
        }

        .character-panel.right .character-select:focus,
        .character-panel.right .character-name:focus,
        .character-panel.right .character-prompt:focus {
            border-color: var(--accent-right);
            background: rgba(139, 92, 246, 0.05);
        }

        .character-prompt {
            height: 120px;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            overflow-y: auto;
        }

        /* Chat container */
        .chat-container {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            min-height: 400px;
            position: relative;
            box-shadow: 
                0 0 60px rgba(59, 130, 246, 0.1),
                0 0 120px rgba(139, 92, 246, 0.05),
                0 30px 60px rgba(0, 0, 0, 0.3);
            animation: centerGlow 12s ease-in-out infinite;
        }

        @keyframes centerGlow {
            0%, 100% { 
                box-shadow: 
                    0 0 60px rgba(59, 130, 246, 0.1),
                    0 0 120px rgba(139, 92, 246, 0.05),
                    0 30px 60px rgba(0, 0, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 80px rgba(59, 130, 246, 0.15),
                    0 0 160px rgba(139, 92, 246, 0.08),
                    0 35px 70px rgba(0, 0, 0, 0.4);
            }
        }

        .chat-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-header h2 {
            font-size: 1.2em;
            font-weight: 400;
            color: var(--text-primary);
            text-align: center;
            margin: 0;
        }

        .rounds-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .rounds-control label {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 500;
        }

        .rounds-slider {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-secondary);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .rounds-slider::-webkit-slider-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .rounds-slider::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .rounds-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .rounds-value {
            color: var(--accent-left);
            font-weight: 600;
            font-size: 1em;
            min-width: 20px;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            animation: messageSlide 0.4s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-left .message-bubble {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1));
            border-left: 3px solid var(--accent-left);
            margin-right: 15%;
        }

        .message-right {
            display: flex;
            justify-content: flex-end;
        }

        .message-right .message-bubble {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1));
            border-right: 3px solid var(--accent-right);
            border-left: none;
            margin-left: 15%;
        }

        .message-bubble {
            padding: 18px;
            border-radius: 12px;
            position: relative;
        }

        .message-author {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .message-left .message-author {
            color: var(--accent-left);
        }

        .message-right .message-author {
            color: var(--accent-right);
            text-align: right;
        }

        .message-content {
            line-height: 1.6;
            color: var(--text-primary);
        }

        .message-right .message-content {
            text-align: right;
        }

        /* Input area */
        .chat-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
        }

        .topic-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .topic-input:focus {
            outline: none;
            border-color: var(--accent-left);
            background: rgba(59, 130, 246, 0.05);
        }

        .topic-input::placeholder {
            color: var(--text-secondary);
        }

        .start-button {
            padding: 14px 35px;
            background: linear-gradient(135deg, var(--accent-left), var(--accent-right));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: inline-flex;
            gap: 5px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin: 10px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-left);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { 
                transform: translateY(0);
                opacity: 0.5;
            }
            30% { 
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .debate-end {
            text-align: center;
            margin: 30px 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .winner-selection {
            text-align: center;
            margin: 20px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15));
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .winner-selection h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: 500;
        }

        .winner-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .winner-btn {
            padding: 12px 24px;
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            position: relative;
            overflow: hidden;
        }

        .winner-btn.left {
            background: linear-gradient(135deg, var(--accent-left), rgba(59, 130, 246, 0.8));
            color: white;
            border-color: var(--accent-left);
        }

        .winner-btn.right {
            background: linear-gradient(135deg, var(--accent-right), rgba(139, 92, 246, 0.8));
            color: white;

                tieOption: "Berabere",
                winnerAnnouncement: "daha güçlü argümanlar sundu!",
                tieAnnouncement: "Berabere kaldı! Her iki taraf da eşit derecede ikna edici argümanlar sundu.",
                debateInProgress: "Karakterler tartışıyor!",
                debateProgress: "Tur {current} / {total}",
                namePlaceholder: "İsim girin...",
                personalityPlaceholder: "Karakterin felsefesi ve kişiliğini tanımlayın..."
            }
        };

        function updateDropdownOptions(lang) {
            const templates = characterTemplates[lang];
            const t = translations[lang];
            
            ['left', 'right'].forEach(side => {
                const select = document.getElementById(`${side}CharSelect`);
                const currentValue = select.value;
                
                select.innerHTML = `
                    <option value="stoic">${templates.stoic.displayName}</option>
                    <option value="buddhist">${templates.buddhist.displayName}</option>
                    <option value="scientist">${templates.scientist.displayName}</option>
                    <option value="artist">${templates.artist.displayName}</option>
                    <option value="existentialist">${templates.existentialist.displayName}</option>
                    <option value="custom">${t.customCharacter}</option>
                `;
                
                select.value = currentValue;
                
                // Update character data if not custom
                if (currentValue !== 'custom') {
                    const template = templates[currentValue];
                    document.getElementById(`${side}CharName`).value = template.name;
                    document.getElementById(`${side}CharPrompt`).value = template.prompt;
                }
            });
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            const t = translations[lang];
            
            document.getElementById('subtitle').innerHTML = t.subtitle;
            document.querySelector('.chat-header h2').textContent = t.chatHeader;
            document.querySelector('.welcome-message').innerHTML = t.welcomeMessage;
            document.getElementById('topicInput').placeholder = t.topicPlaceholder;
            
            // Debug rounds label
            const roundsLabelElement = document.getElementById('roundsLabel');
            console.log('roundsLabel element:', roundsLabelElement);
            console.log('Setting roundsLabel to:', t.roundsLabel);
            if (roundsLabelElement) {
                roundsLabelElement.textContent = t.roundsLabel;
                roundsLabelElement.innerHTML = t.roundsLabel; // Force both textContent and innerHTML
                console.log('roundsLabel updated to:', roundsLabelElement.textContent);
                
                // Also force update after a delay to override any other changes
                setTimeout(() => {
                    roundsLabelElement.textContent = t.roundsLabel;
                }, 100);
            }
            
            const startBtn = document.getElementById('startButton');
            if (startBtn) {
                if (startBtn.innerHTML.includes('New Debate') || startBtn.innerHTML.includes('Yeni Tartışma')) {
                    startBtn.textContent = lang === 'en' ? 'New Debate' : 'Yeni Tartışma';
                } else {
                    startBtn.textContent = t.startButton;
                }
            }
            
            // Update specific labels by ID
            const labelElements = [
                'leftTemplateLabel', 'rightTemplateLabel',
                'leftNameLabel', 'rightNameLabel', 
                'leftPersonalityLabel', 'rightPersonalityLabel'
            ];
            
            const labelTexts = [
                t.characterTemplate, t.characterTemplate,
                t.characterName, t.characterName,
                t.characterPersonality, t.characterPersonality
            ];
            
            labelElements.forEach((labelId, index) => {
                const element = document.getElementById(labelId);
                if (element && labelTexts[index]) {
                    element.textContent = labelTexts[index];
                }
            });
            
            // Update dropdown options
            updateDropdownOptions(lang);
            
            // Update character prompts if not custom
            ['left', 'right'].forEach(side => {
                const select = document.getElementById(`${side}CharSelect`);
                const currentValue = select.value;
                const nameInput = document.getElementById(`${side}CharName`);
                const promptInput = document.getElementById(`${side}CharPrompt`);
                
                // Update placeholders
                nameInput.placeholder = t.namePlaceholder;
                promptInput.placeholder = t.personalityPlaceholder;
                
                if (currentValue !== 'custom') {
                    const template = characterTemplates[lang][currentValue];
                    nameInput.value = template.name;
                    promptInput.value = template.prompt;
                }
            });
            
            // Update language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            const langBtn = document.getElementById('lang' + lang.toUpperCase());
            if (langBtn) {
                langBtn.classList.add('active');
            }
        }

        function changeLanguage(lang) {
            // Save language preference
            localStorage.setItem('diailog_language', lang);
            
            // Reload page to apply language change
            window.location.reload();
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            toggleInputs('left', false);  // Start with stoic locked
            toggleInputs('right', false); // Start with buddhist locked
            setLanguage(currentLanguage); // Use saved language preference
            
            // Initialize rounds slider - using more robust approach
            setTimeout(() => {
                console.log('Starting slider initialization...');
                const roundsSlider = document.getElementById('roundsSlider');
                const roundsValue = document.getElementById('roundsValue');
                
                console.log('Slider element:', roundsSlider);
                console.log('Value element:', roundsValue);
                console.log('Slider current value:', roundsSlider ? roundsSlider.value : 'N/A');
                
                function updateRoundsDisplay() {
                    const slider = document.getElementById('roundsSlider');
                    const valueSpan = document.getElementById('roundsValue');
                    
                    if (slider && valueSpan) {
                        const value = parseInt(slider.value);
                        const rounds = value * 2; // 1->2, 2->4, 3->6, 4->8
                        valueSpan.textContent = rounds;
                        valueSpan.innerHTML = rounds; // Force both
                        console.log(`✅ Slider updated: ${value} -> Rounds: ${rounds}`);
                        console.log('Value span content:', valueSpan.textContent);
                    } else {
                        console.error('❌ Elements missing in updateRoundsDisplay');
                    }
                }
                
                if (roundsSlider && roundsValue) {
                    console.log('✅ Both elements found, initializing...');
                    
                    // Force initial update multiple times
                    updateRoundsDisplay();
                    setTimeout(updateRoundsDisplay, 50);
                    setTimeout(updateRoundsDisplay, 200);
                    
                    // Add event listeners
                    ['input', 'change', 'mouseup', 'touchend'].forEach(eventType => {
                        roundsSlider.addEventListener(eventType, updateRoundsDisplay);
                        console.log(`Added ${eventType} listener`);
                    });
                    
                    console.log('✅ Slider initialized successfully');
                } else {
                    console.error('❌ Slider elements not found!');
                    console.log('Available elements:', document.querySelectorAll('#roundsSlider, #roundsValue'));
                }
            }, 1000); // Even longer delay
        });

        // Google Apps Script Web App URL
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby-xAjVDtqcw9yyaNFu-2REGn8axO56TJ1W7FWP8di5Iwe3lrdYdaFXQ0zloWAnq6BJ/exec';

        async function logData(anon_id, model_pick, topic, extra = '') {
            try {
                console.log('🔄 Starting log request...');
                console.log('📊 Data to log:', { anon_id, model_pick, topic, extra });
                console.log('🌐 URL:', WEB_APP_URL);
                
                const requestBody = {
                    anon_id: anon_id,
                    model_pick: model_pick,
                    topic: topic,
                    extra: extra
                };
                
                console.log('📤 Request body:', JSON.stringify(requestBody, null, 2));
                
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                console.log('📨 Response status:', response.status);
                console.log('📨 Response headers:', [...response.headers.entries()]);
                
                const responseText = await response.text();
                console.log('📄 Raw response:', responseText);
                
                if (!response.ok) {
                    console.error('❌ HTTP Error:', response.status, response.statusText);
                    return { error: `HTTP ${response.status}: ${response.statusText}` };
                }
                
                let result;
                try {
                    result = JSON.parse(responseText);
                    console.log('✅ Parsed JSON result:', result);
                } catch (parseError) {
                    console.warn('⚠️ Could not parse as JSON:', parseError);
                    result = { success: true, raw: responseText };
                }
                
                return result;
                
            } catch (error) {
                console.error('💥 Log request failed:', error);
                console.error('💥 Error details:', error.message, error.stack);
                return { error: error.message };
            }
        }

        // Test function for Google Sheets (call from console)
        window.testGoogleSheets = async function() {
            console.log('🧪 Testing Google Sheets connection...');
            const result = await logData('test_user', 'test_model', 'test_topic', 'test_extra');
            console.log('🧪 Test result:', result);
            return result;
        }

        async function callClaude(messages) {
            try {
                // Use local server instead of direct API call
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        messages: messages
                    })
                });

                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }

                const data = await response.json();
                return data.content || data.response || "No response received";
            } catch (error) {
                console.error("Error calling Claude:", error);
                return "Üzgünüm, bir hata oluştu. Lütfen tekrar deneyin.";
            }
        }

        function addMessage(author, content, isLeft) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isLeft ? 'message-left' : 'message-right'}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-author">${author}</div>
                    <div class="message-content">${content}</div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function checkInappropriateContent(text) {
            const inappropriateWords = [
                // Turkish inappropriate words
                'sex', 'seks', 'porn', 'porno', 'fuck', 'shit', 'damn', 'hell', 
                'cinsel', 'cinsellik', 'tecavüz', 'şiddet', 'öldür', 'intihar',
                'uyuşturucu', 'eroin', 'kokain', 'kumar', 'fuhuş', 'soygun',
                'bomba', 'terör', 'terörist', 'silah', 'cinayet', 'hırsızlık'
            ];
            
            const lowerText = text.toLowerCase();
            return inappropriateWords.some(word => lowerText.includes(word));
        }

        function showContentWarning() {
            const chatMessages = document.getElementById('chatMessages');
            const t = translations[currentLanguage];
            
            const warningTitle = currentLanguage === 'tr' 
                ? '⚠️ İçerik Uyarısı'
                : '⚠️ Content Warning';
            
            const warningMessage = currentLanguage === 'tr' 
                ? 'Karakterler bu konuyu tartışmak istemiyor. Lütfen farklı bir konu deneyin.'
                : 'The characters don\'t want to discuss this topic. Please try a different topic.';
                
            chatMessages.innerHTML = `
                <div class="message">
                    <div class="message-bubble" style="background: linear-gradient(135deg, rgba(220, 38, 127, 0.2), rgba(239, 68, 68, 0.1)); border-left: 3px solid #dc2626; margin: 20px 0; text-align: center;">
                        <div style="color: #dc2626; font-weight: 600; margin-bottom: 8px;">${warningTitle}</div>
                        <div style="color: var(--text-primary);">${warningMessage}</div>
                    </div>
                </div>
            `;
        }

        async function startDebate() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                const alertMessage = currentLanguage === 'tr' ? 'Lütfen bir tartışma konusu girin!' : 'Please enter a debate topic!';
                alert(alertMessage);
                return;
            }
            
            // Check for inappropriate content
            if (checkInappropriateContent(topic)) {
                showContentWarning();
                return;
            }

            const leftName = document.getElementById('leftCharName').value || 'Left Character';
            const leftPrompt = document.getElementById('leftCharPrompt').value;
            const rightName = document.getElementById('rightCharName').value || 'Right Character';
            const rightPrompt = document.getElementById('rightCharPrompt').value;

            // Generate unique anonymous ID
            const anon_id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            // Log debate start (Google Sheets - legacy)
            try {
                await logData(anon_id, `${leftName} vs ${rightName}`, topic, `Left: ${leftPrompt.substring(0, 50)}... Right: ${rightPrompt.substring(0, 50)}...`);
            } catch (error) {
                console.warn('Logging failed:', error);
            }

            // Save question to database
            try {
                const roundsSliderVal = document.getElementById('roundsSlider');
                await fetch('/api/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic,
                        leftChar: leftName,
                        rightChar: rightName,
                        rounds: parseInt(roundsSliderVal.value),
                        language: currentLanguage
                    })
                });
            } catch (error) {
                console.warn('DB log failed:', error);
            }

            // Clear and start
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            document.getElementById('startButton').disabled = true;
            document.getElementById('startButton').innerHTML = '<div class="loading"></div>';
            
            // Get number of rounds from slider
            const roundsSlider = document.getElementById('roundsSlider');
            const totalRounds = parseInt(roundsSlider.value) * 2; // 1->2, 2->4, 3->6, 4->8
            const totalMessages = totalRounds; // Each round = 1 message per character
            
            const t = translations[currentLanguage];
            
            conversationHistory = [];
            currentRound = 0;
            const responseLanguage = currentLanguage === 'tr' ? 'Turkish' : 'English';

            // Debate loop - show each message as it arrives
            for (let round = 0; round < totalRounds / 2; round++) {

                // Show typing indicator for left character
                showTypingIndicator();

                // Left character speaks
                const leftMessages = [
                    {
                        role: "user",
                        content: `${leftPrompt}

Topic of discussion: "${topic}"

${conversationHistory.length > 0 ? `Previous conversation:
${conversationHistory.map(h => `${h.author}: ${h.content}`).join('\n\n')}

Now respond to what ${rightName} just said. Build upon their arguments, challenge their points respectfully, or find common ground.` : 'You speak first on this topic.'}

Keep your response concise (2-3 sentences max). Stay true to your philosophical stance while engaging meaningfully with the discussion.

IMPORTANT:
- Respond in ${responseLanguage} language
- Do NOT include your character name at the beginning of your response
- Don't repeat their exact words, but engage with their ideas naturally
- Give only your direct response, without any prefixes like "${leftName}:" or similar`
                    }
                ];

                const leftResponse = await callClaude(leftMessages);
                removeTypingIndicator();

                // Clean response - remove character name if it appears at the beginning
                const cleanLeftResponse = leftResponse.replace(new RegExp(`^${leftName}:\\s*`, 'i'), '');

                conversationHistory.push({ author: leftName, content: cleanLeftResponse });
                addMessage(leftName, cleanLeftResponse, true);

                // Kullanıcı okusun diye kısa bekleme
                await new Promise(r => setTimeout(r, 1500));

                // Show typing indicator for right character
                showTypingIndicator();

                // Right character speaks
                const rightMessages = [
                    {
                        role: "user",
                        content: `${rightPrompt}

Topic of discussion: "${topic}"

Previous conversation:
${conversationHistory.map(h => `${h.author}: ${h.content}`).join('\n\n')}

Now respond directly to what ${leftName} just said. Address their specific points, provide counterarguments, or build upon shared ideas. Make this a real dialogue, not just separate statements.

Keep your response concise (2-3 sentences max). Stay true to your philosophical stance while engaging meaningfully with ${leftName}'s arguments.

IMPORTANT:
- Respond in ${responseLanguage} language
- Do NOT include your character name at the beginning of your response
- Don't repeat their exact words, but engage with their ideas naturally
- Give only your direct response, without any prefixes like "${rightName}:" or similar`
                    }
                ];

                const rightResponse = await callClaude(rightMessages);
                removeTypingIndicator();

                // Clean response - remove character name if it appears at the beginning
                const cleanRightResponse = rightResponse.replace(new RegExp(`^${rightName}:\\s*`, 'i'), '');

                conversationHistory.push({ author: rightName, content: cleanRightResponse });
                addMessage(rightName, cleanRightResponse, false);

                // Sonraki round öncesi bekleme
                await new Promise(r => setTimeout(r, 1500));
            }

            // Debate end
            const endMessage = document.createElement('div');
            endMessage.className = 'debate-end';
            endMessage.textContent = t.debateEnd;
            chatMessages.appendChild(endMessage);

            // Winner selection
            const winnerSelection = document.createElement('div');
            winnerSelection.className = 'winner-selection';
            winnerSelection.innerHTML = `
                <h3>${t.winnerQuestion}</h3>
                <div class="winner-buttons">
                    <button class="winner-btn left" onclick="selectWinner('${leftName}', 'left')">${leftName}</button>
                    <button class="winner-btn right" onclick="selectWinner('${rightName}', 'right')">${rightName}</button>
                    <button class="winner-btn tie" onclick="selectWinner('${t.tieOption}', 'tie')">${t.tieOption}</button>
                </div>
            `;
            chatMessages.appendChild(winnerSelection);

            // Don't auto-scroll - let users read from the beginning

            document.getElementById('startButton').disabled = false;
            document.getElementById('startButton').innerHTML = currentLanguage === 'tr' ? 'Yeni Tartışma' : 'New Debate';
        }

        function selectWinner(winnerName, side) {
            // Remove winner selection and add result
            const winnerSelection = document.querySelector('.winner-selection');
            if (winnerSelection) {
                winnerSelection.remove();
            }

            const t = translations[currentLanguage];
            const winnerResult = document.createElement('div');
            winnerResult.className = 'winner-selected';
            
            // Different message for tie vs winner
            if (side === 'tie') {
                winnerResult.innerHTML = `🤝 ${t.tieAnnouncement}`;
            } else {
                winnerResult.innerHTML = `🏆 <strong>${winnerName}</strong> ${t.winnerAnnouncement}`;
            }
            
            document.getElementById('chatMessages').appendChild(winnerResult);

            // Log winner selection to Google Sheets
            try {
                const anon_id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                logData(anon_id, 'winner_selection', winnerName, `Side: ${side}`);
            } catch (error) {
                console.warn('Winner logging failed:', error);
            }
        }

        // Mobile VH fix for address bar issues
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        // Set initial VH
        setVH();
        
        // Update VH on resize and orientation change
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', () => {
            setTimeout(setVH, 100);
        });

        // Enter key to start
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('startButton').disabled) {
                startDebate();
            }
        });
    </script>
</body>
